name: openair
base: core22
version: "0.16.8+36"
summary: A free and open-source cross-platform podcast app
description: |
  OpenAir is a free and open-source podcast app that empowers you to
  explore and enjoy the vast world of podcasts.

title: OpenAir
contact: openairpodapp@gmail.com
license: Apache-2.0
website: https://openair-podcast.github.io/openair-website/
source-code: https://github.com/OpenAir-Podcast/OpenAir
issues: https://github.com/OpenAir-Podcast/OpenAir/issues
donation: https://www.paypal.com/ncp/payment/LFM3C2KRXSR5W
grade: stable
confinement: strict

apps:
  openair:
    command: openair
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - audio-playback
      - home
      - removable-media
      - screen-inhibit-control

parts:
  openair:
    source: .
    plugin: flutter
    flutter-channel: stable
    flutter-target: lib/main.dart
    build-packages:
      - cmake
      - clang
      - ninja-build
      - pkg-config
      - libgtk-3-dev
      - liblzma-dev
      - libsecret-1-dev
      - libjsoncpp-dev
      - libcurl4-openssl-dev
      - libwebkit2gtk-4.1-dev
    stage-packages:
      - libgtk-3-0
      - libpulse0
      - libsqlite3-0
      - libsecret-1-0
      - libjsoncpp25
      - libcurl4
      - libwebkit2gtk-4.1-0
      - fonts-dejavu-core
      - fontconfig
    override-build: |
      apt-get update
      apt-get install -y libmpv1
      craftctl default
      find /usr/lib/ -maxdepth 2 -name 'libmpv.so.*' -exec cp -nL {} "$SNAPCRAFT_PART_INSTALL/usr/lib/x86_64-linux-gnu/" \;
      cp "$SNAPCRAFT_PART_INSTALL/OpenAir" "$SNAPCRAFT_PART_INSTALL/openair"
