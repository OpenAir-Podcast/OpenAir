app-id: com.openair.podcast
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm19
command: OpenAir

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications
  - --own-name=org.mpris.MediaPlayer2.com.openair.podcast
  - --talk-name=org.mpris.MediaPlayer2.*

modules:
  - name: openair
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/llvm19/bin:/run/build/openair/flutter/bin
      env:
        PUB_CACHE: /run/build/openair/.pub-cache
    sources:
      - type: git
        url: https://github.com/OpenAir-Podcast/OpenAir.git
        tag: v0.18.7
      - type: git
        url: https://github.com/flutter/flutter.git
        tag: 3.44.0
        dest: flutter
    build-commands:
      - flutter config --no-enable-web --no-enable-android --no-enable-ios --no-enable-macos --no-enable-windows
      - flutter build linux --release

      - export BUNDLE_PATH=$(find build/linux -name bundle -type d)

      - install -D $BUNDLE_PATH/OpenAir /app/bin/OpenAir
      - install -Dm644 assets/icons/com.openair.podcast.svg /app/share/icons/hicolor/scalable/apps/com.openair.podcast.svg
      - install -Dm644 flatpak/com.openair.podcast.metainfo.xml /app/share/metainfo/com.openair.podcast.metainfo.xml
      - install -Dm644 linux/com.openair.podcast.desktop /app/share/applications/com.openair.podcast.desktop

      - cp -r $BUNDLE_PATH/lib/* /app/lib/
      - cp -r $BUNDLE_PATH/data /app/share/com.openair.podcast
