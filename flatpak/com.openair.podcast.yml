app-id: com.openair.podcast
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm19
command: OpenAir

finish-args:
  # Networking
  - --share=network
  - --share=ipc
  
  # Graphics & Display (Modern Wayland + X11 Fallback)
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  
  # Audio (Standard for modern Linux)
  - --socket=pulseaudio
  
  # Integration
  - --talk-name=org.freedesktop.Notifications
  
  # Note: MPRIS control usually requires talking to the bus as well
  - --talk-name=org.mpris.MediaPlayer2.*

modules:
  - name: openair
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/llvm19/bin:/run/build/openair/flutter/bin
      env:
        PUB_CACHE: /run/build/openair/.pub-cache
    sources:
      - type: git
        url: https://github.com/OpenAir-Podcast/OpenAir.git
        tag: v0.16.8
      - type: git
        url: https://github.com/flutter/flutter.git
        tag: 3.35.6
        dest: flutter
      - type: file
        path: dart-sdk-linux-x64.zip
        sha256: 20da5b821bfbabc2471a3ae566c89a28db46f30d1369264ea5efc553a395bd68
        dest: flutter/bin/cache
    build-commands:
      # Unpack Dart SDK into Flutter cache
      - unzip -q flutter/bin/cache/dart-sdk-linux-x64.zip -d flutter/bin/cache/
      - rm flutter/bin/cache/dart-sdk-linux-x64.zip
      # Prevent Flutter from trying to download Dart SDK
      - "truncate -s 0 flutter/bin/internal/update_dart_sdk.sh"
      # Build
      - flutter build linux --release

      # Determine BUNDLE_PATH dynamically (Cleaner than hardcoding arch envs)
      - export BUNDLE_PATH=$(find build/linux -name bundle -type d)

      # Install Binary
      - install -D $BUNDLE_PATH/OpenAir /app/bin/OpenAir

      # Install Metadata (Matching the App-ID!)
      - install -Dm644 assets/icons/com.openair.podcast.svg /app/share/icons/hicolor/scalable/apps/com.openair.podcast.svg
      - install -Dm644 flatpak/com.openair.podcast.metainfo.xml /app/share/metainfo/com.openair.podcast.metainfo.xml
      - install -Dm644 linux/com.openair.podcast.desktop /app/share/applications/com.openair.podcast.desktop

      # Install Data and Libs
      - cp -r $BUNDLE_PATH/lib/* /app/lib/
      - cp -r $BUNDLE_PATH/data /app/share/com.openair.podcast
