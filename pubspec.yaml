name: openair

description:
  "OpenAir is a free and open-source cross-platform podcast app that empowers you to
  explore and enjoy the vast world of podcasts."

publish_to: "none"

version: 0.16.9+37

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  media_kit: ^1.2.6
  media_kit_libs_audio: ^1.0.7 
  just_audio: ^0.10.5
  just_audio_media_kit: ^2.1.0
  audio_service: ^0.18.4
  audio_session: ^0.1.16
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.1.1
  convert: ^3.1.1
  crypto: ^3.0.3
  cupertino_icons: ^1.0.2
  dio: ^5.8.0+1
  file_picker: ^11.0.2
  envied: ^1.3.4
  flutter_localizations_plus: ^0.3.0
  flutter_riverpod: ^3.3.1
  hive_ce: ^2.11.3
  hive_ce_flutter: ^2.3.1
  http: ^1.2.1
  icon_forest: ^1.1.8
  logger: ^2.3.0
  oauth2_client: ^4.2.0
  opml: ^0.4.0
  path: ^1.9.0
  path_provider: ^2.1.3
  path_to_regexp: ^0.4.0
  permission_handler: ^12.0.1
  shimmer: ^3.0.0
  theme_provider: ^0.6.0
  url_launcher: ^6.3.2
  webfeed_plus: ^1.1.2
  xml: ^6.5.0
  package_info_plus: ^9.0.1
  scheduled_timer: ^2.0.1
  supabase_flutter: ^2.10.0
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.3
  flutter_local_notifications: ^21.0.0
  window_manager: ^0.5.1
  flutter_html: ^3.0.0
  intl: ^0.20.2
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter

  envied_generator: ^1.3.4
  build_runner: ^2.4.15
  flutter_lints: ^6.0.0
  hive_ce_generator: ^1.9.2
  rename: ^3.1.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  intl: ^0.20.2

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/icon.png"

flutter:
  uses-material-design: true

  assets:
    - locales/
    - assets/icons/icon.png
    - assets/icons/icon_512.png
    - assets/icons/com.openair.podcast.svg
    - assets/images/github-white-logo.png
    - assets/images/github-black-logo.png
    - assets/images/google-white-logo.png
    - assets/images/google-black-logo.png
