name: Flutter Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "OpenAir ${{ github.ref_name }}" \
            --notes-file CHANGELOG_SHORT.txt \
            --draft \
            --prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_linux_tarball:
    needs: create_release
    name: Linux (tar.gz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev libsecret-1-dev libjsoncpp-dev liblzma-dev ninja-build pkg-config
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package
        run: |
          RELEASE_NAME="openair-${{ github.ref_name }}-linux-x64.tar.gz"
          cd build/linux/x64/release/bundle
          tar -czvf "../../../../../$RELEASE_NAME" .
      - name: Upload
        run: |
          gh release upload "${{ github.ref_name }}" \
            "openair-${{ github.ref_name }}-linux-x64.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_appimage:
    needs: create_release
    name: Linux (AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux Build & AppImage Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev libsecret-1-dev libjsoncpp-dev liblzma-dev ninja-build pkg-config wget file

          sudo wget -O /usr/local/bin/linuxdeploy "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          sudo chmod +x /usr/local/bin/linuxdeploy

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Bundle AppImage
        run: |
          mkdir -p AppDir
          cp -r build/linux/x64/release/bundle/* AppDir/

          # Setup basic metadata requirements for linuxdeploy
          echo -e "[Desktop Entry]\nName=OpenAir\nExec=openair\nIcon=openair\nType=Application\nCategories=AudioVideo;Player;" > AppDir/openair.desktop
          touch AppDir/openair.png 

          # FIXED: Added the AppImage extract runtime environment flag to bypass GitHub Actions container constraints
          export OUTPUT="openair-${{ github.ref_name }}-x86_64.AppImage"
          export APPIMAGE_EXTRACT_AND_RUN=1
          linuxdeploy --appdir AppDir --plugin appimage --output appimage

      - name: Upload AppImage
        run: |
          gh release upload "${{ github.ref_name }}" \
            openair-*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_windows:
    needs: create_release
    name: Windows (zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        shell: powershell
        run: |
          $ZipName = "openair-${{ github.ref_name }}-windows-x64.zip"
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath $ZipName
      - name: Upload
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            "openair-${{ github.ref_name }}-windows-x64.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_android:
    needs: create_release
    name: Android (APK & AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Setup keystore
        shell: bash
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=../upload-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - run: flutter pub get
      - run: |
          flutter build apk --release --android-skip-build-dependency-validation
          flutter build appbundle --release --android-skip-build-dependency-validation
      - name: Rename APK for Clear Branding
        run: cp build/app/outputs/flutter-apk/app-release.apk openair-${{ github.ref_name }}-android.apk
      - name: Upload Releases
        run: |
          gh release upload "${{ github.ref_name }}" \
            openair-${{ github.ref_name }}-android.apk \
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
