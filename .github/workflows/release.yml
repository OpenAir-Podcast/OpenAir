name: Flutter Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "OpenAir ${{ github.ref_name }}" \
            --notes-file CHANGELOG_SHORT.txt \
            --draft \
            --prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_linux:
    needs: create_release
    name: Linux (tar.gz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev libsecret-1-dev libjsoncpp-dev liblzma-dev ninja-build pkg-config
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package
        run: |
          RELEASE_NAME="openair-${{ github.ref_name }}-linux-x64.tar.gz"
          # Target the complete build bundle directory
          cd build/linux/x64/release/bundle
          tar -czvf "../../../../../$RELEASE_NAME" .
      - name: Upload
        run: |
          gh release upload "${{ github.ref_name }}" \
            "openair-${{ github.ref_name }}-linux-x64.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_windows:
    needs: create_release
    name: Windows (zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        shell: powershell
        run: |
          $ZipName = "openair-${{ github.ref_name }}-windows-x64.zip"
          # Path corrected to structural target: x64/release/runner
          Compress-Archive -Path build/windows/x64/release/runner/* -DestinationPath $ZipName
      - name: Upload
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            "openair-${{ github.ref_name }}-windows-x64.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_android:
    needs: create_release
    name: Android (APK & AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      
      # Build both distribution configurations with the dependency validation bypass
      - name: Build Assets
        run: |
          flutter build apk --release --android-skip-build-dependency-validation
          flutter build appbundle --release --android-skip-build-dependency-validation
          
      - name: Rename APK for Clear Branding
        run: cp build/app/outputs/flutter-apk/app-release.apk openair-${{ github.ref_name }}-android.apk
        
      - name: Upload Releases
        run: |
          gh release upload "${{ github.ref_name }}" \
            openair-${{ github.ref_name }}-android.apk \
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_snap:
    needs: create_release
    name: Linux (Snap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync version from pubspec
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //; s/"//g; s/ //g')
          sed -i "s/^version: .*/version: \"$VERSION\"/" snap/snapcraft.yaml
      - uses: snapcore/action-build@v1
        id: snapcraft
      - name: Upload
        run: |
          gh release upload "${{ github.ref_name }}" \
            "${{ steps.snapcraft.outputs.snap }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_flatpak:
    needs: create_release
    name: Linux (Flatpak)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install flatpak
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak flatpak-builder
      - name: Add Flathub remote
        run: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      - name: Install runtime and SDK
        run: |
          flatpak install -y --noninteractive flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08 org.freedesktop.Sdk.Extension.llvm19//24.08
      - name: Sync tag in flatpak manifest
        run: |
          sed -i "s|tag: .*|tag: ${{ github.ref_name }}|" flatpak/com.openair.podcast.yml
      - name: Build flatpak
        run: flatpak-builder --force-clean --repo=repo flatpak_app flatpak/com.openair.podcast.yml
      - name: Bundle
        run: flatpak build-bundle repo openair.flatpak com.openair.podcast master
      - name: Upload
        run: |
          gh release upload "${{ github.ref_name }}" \
            openair.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
